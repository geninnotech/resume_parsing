{% extends "base.html" %}
{% block content %}
<div class="bg-white rounded-xl shadow p-6">
  <h1 class="text-2xl font-semibold mb-4">Upload resumes & job description</h1>
  <form method="post" enctype="multipart/form-data" class="space-y-4">
    <div>
      <label class="block text-sm font-medium text-slate-700 mb-1">
        Job description
      </label>
      <textarea name="job_description" rows="6"
        class="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
        placeholder="Paste the JD here..."></textarea>
    </div>

    <div>
      <label class="block text-sm font-medium text-slate-700 mb-1">
        Default vectors JSON
      </label>
      <textarea name="default_vectors" rows="6"
        class="w-full border rounded-lg px-3 py-2 text-sm font-mono focus:outline-none focus:ring-2 focus:ring-blue-500"
        placeholder='[{"vector_name": "...", "vector_description": "..."}, ...]'></textarea>
      <p class="text-xs text-slate-500 mt-1">
        These are your generic assessment vectors; custom vectors will be generated from them using the JD.
      </p>
    </div>

    <div>
      <label class="block text-sm font-medium text-slate-700 mb-1">
        Resume PDFs
      </label>
      <input type="file" name="pdfs" multiple accept="application/pdf"
             class="block w-full text-sm text-slate-700 file:mr-4 file:py-2 file:px-4
                    file:rounded-full file:border-0 file:text-sm file:font-semibold
                    file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100" />
      <p class="text-xs text-slate-500 mt-1">You can select multiple PDFs.</p>
    </div>

    <div>
      <button type="submit"
              class="inline-flex items-center px-4 py-2 rounded-lg text-sm font-semibold
                     bg-blue-600 text-white hover:bg-blue-700">
        Process resumes
      </button>
    </div>
  </form>
</div>
{% endblock %}
